name: Fast Verify

on:
  push:
    branches:
      - main
      - master
      - 'dev/**'
      - 'feat/**'
      - 'fix/**'
      - 'ci/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fast-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.7'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYFCSTM_EXPECTED_COMMIT: f142a656df43e0b80ed6b7ac63b0696345325646

jobs:
  # Stage 1 keeps the normal push/PR gate short while still producing a real
  # native onefile product for the fresh stage.  Full onedir/onefile release
  # evidence remains in build.yml.
  build:
    name: Fast build and source verify (${{ matrix.label }})
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            qt_platform: xcb
          - os: windows-2022
            label: windows-x86_64
            qt_platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Windows GUI runtime
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-cairo

      - name: Expose Windows Cairo runtime
        if: runner.os == 'Windows'
        shell: bash
        run: |
          MINGW_BIN="$(cygpath -u '${{ steps.msys2.outputs.msys2-location }}\mingw64\bin')"
          echo "MINGW_BIN=$MINGW_BIN" >> "$GITHUB_ENV"
          # GITHUB_ENV is step-scoped for shell variables; GITHUB_PATH keeps
          # the DLL directory visible to every later Windows step as well.
          echo "$MINGW_BIN" >> "$GITHUB_PATH"

      - name: Set Windows native GUI resolution
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Install Linux GUI runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libxkbcommon-x11-0 libxkbcommon0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 \
            libegl1 libgl1 libglx-mesa0 libopengl0 libfontconfig1 \
            libdbus-1-3 libnss3 libxcomposite1 libxdamage1 libxrandr2 \
            libxtst6

      - name: Install runtime dependencies and generate UI
        shell: bash
        run: |
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          python -m pip install -r requirements-build.txt -r requirements-test.txt -r requirements.txt
          make ui

      - name: Verify pinned pyfcstm source
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import importlib_metadata
          expected = os.environ['PYFCSTM_EXPECTED_COMMIT']
          direct = json.loads(importlib_metadata.distribution('pyfcstm').read_text('direct_url.json') or '{}')
          installed = (direct.get('vcs_info') or {}).get('commit_id')
          if installed != expected:
              raise SystemExit('pyfcstm source mismatch: {}'.format(installed))
          print('pyfcstm commit', installed)
          PY

      - name: Run real self-check and GUI acceptance
        shell: bash
        env:
          QT_QPA_PLATFORM: ${{ matrix.qt_platform }}
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            run_gui() { xvfb-run -a env QT_QPA_PLATFORM=xcb "$@"; }
          else
            run_gui() { env QT_QPA_PLATFORM=windows "$@"; }
          fi
          mkdir -p fast-evidence
          run_gui python main.py --self-check --json-report fast-evidence/self-check.json \
            2>&1 | tee fast-evidence/self-check.log
          run_gui python main.py --acceptance-check --viewport 1280x720 \
            --json-report fast-evidence/acceptance.json \
            --artifact-dir fast-evidence/artifacts \
            2>&1 | tee fast-evidence/acceptance.log
          python - <<'PY'
          import json
          for path, expected, key in (
              ('fast-evidence/self-check.json', 182, 'passed'),
              ('fast-evidence/acceptance.json', 140, 'passed'),
          ):
              report = json.load(open(path))
              if report.get('status') != 'passed' or report.get('counts', {}).get(key) != expected:
                  raise SystemExit('{} did not pass: {}'.format(path, report.get('counts')))
          print('fast evidence: self-check=182/182 acceptance=140/140')
          PY

      - name: Build fast onefile product
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onefile
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          rm -rf build dist
          pyinstaller --noconfirm main.spec 2>&1 | tee fast-evidence/pyinstaller.log
          test -f "dist/${{ matrix.executable }}"
          mkdir -p fast-product
          cp "dist/${{ matrix.executable }}" "fast-product/${{ matrix.executable }}"
          python - <<'PY'
          import hashlib
          import pathlib
          path = pathlib.Path('fast-product') / '${{ matrix.executable }}'
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          (path.parent / 'SHA256SUMS.txt').write_text('{}  {}\n'.format(digest, path.name))
          print(path, path.stat().st_size, digest)
          PY

      - name: Run focused regression and contract tests
        shell: bash
        run: |
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          python -m pytest -q \
            test/test_self_check.py \
            test/test_evidence_contract.py \
            test/docs/test_workflow_documentation.py \
            --timeout=120

      - name: Upload fast evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-fast-evidence
          path: fast-evidence
          if-no-files-found: error
          retention-days: 7

      - name: Upload fast onefile product
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-fast-product
          path: fast-product
          if-no-files-found: error
          retention-days: 7

  # Stage 2 is intentionally black-box and self-check-only.  It does not
  # checkout source, install project Python dependencies, or run acceptance
  # through the source tree.  This catches missing native/data dependencies
  # without turning the ten-minute fast gate into a second GUI matrix.
  fresh:
    # This job has no checkout and installs no project Python dependencies.
    name: Fast fresh self-check (${{ matrix.label }})
    needs: build
    if: ${{ always() }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux-x86_64
            executable: fcstm-gui
            qt_platform: xcb
          - os: windows-2022
            label: windows-x86_64
            executable: fcstm-gui.exe
            qt_platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare fresh evidence directory
        shell: bash
        run: mkdir -p fast-fresh-evidence

      - name: Install Linux fresh host runtime only
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb default-jre-headless

      - name: Set up Java 11 on Windows
        if: runner.os == 'Windows'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Set Windows native GUI resolution
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Download fast onefile product
        uses: actions/download-artifact@v8
        with:
          name: fcstm-gui-${{ matrix.label }}-fast-product
          path: downloaded

      - name: Verify fresh tool boundary
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = "Windows" ]; then
            tool_dir="$(cygpath -u "$RUNNER_TEMP")/fcstm-gui-no-project-tools"
          else
            tool_dir="$RUNNER_TEMP/fcstm-gui-no-project-tools"
          fi
          mkdir -p "$tool_dir"
          : > fast-fresh-evidence/tool-preflight.log
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            {
              echo '#!/usr/bin/env sh'
              echo "echo fresh runner forbids $tool >&2"
              echo 'exit 127'
            } > "$tool_dir/$tool"
            {
              echo '@echo off'
              echo "echo fresh runner forbids $tool 1>&2"
              echo 'exit /b 127'
            } > "$tool_dir/$tool.cmd"
            chmod +x "$tool_dir/$tool" "$tool_dir/$tool.cmd"
          done
          export PATH="$tool_dir:$PATH"
          export GRAPHVIZ_DOT="$tool_dir/dot"
          export CC="$tool_dir/cc"
          export CXX="$tool_dir/c++"
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            resolved="$(command -v "$tool")"
            printf '%s -> %s\n' "$tool" "$resolved" | tee -a fast-fresh-evidence/tool-preflight.log
            case "$resolved" in
              "$tool_dir"/*) ;;
              *) echo "$tool escaped fresh shadow: $resolved" >&2; exit 1 ;;
            esac
            set +e
            "$tool" --version >> fast-fresh-evidence/tool-preflight.log 2>&1
            status=$?
            set -e
            test "$status" -eq 127
          done

      - name: Run fresh onefile self-check only
        shell: bash
        env:
          FCSTM_GUI_PRODUCT_LAYOUT: onefile
          QT_QPA_PLATFORM: ${{ matrix.qt_platform }}
        run: |
          set -o pipefail
          executable="downloaded/${{ matrix.executable }}"
          if [ "$RUNNER_OS" != "Windows" ]; then chmod +x "$executable"; fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a env QT_QPA_PLATFORM=xcb "$executable" \
              --self-check --json-report fast-fresh-evidence/self-check.json \
              2>&1 | tee fast-fresh-evidence/self-check.log
          else
            env QT_QPA_PLATFORM=windows "$executable" \
              --self-check --json-report fast-fresh-evidence/self-check.json \
              2>&1 | tee fast-fresh-evidence/self-check.log
          fi
          grep -F '"status": "passed"' fast-fresh-evidence/self-check.json
          grep -F '"passed": 182' fast-fresh-evidence/self-check.json
          echo 'fresh self-check: 182/182'

      - name: Upload fresh self-check evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-fast-fresh-evidence
          path: fast-fresh-evidence
          if-no-files-found: error
          retention-days: 7
