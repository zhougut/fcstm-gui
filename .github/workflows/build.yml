name: Full Release Build & Verify

on:
  # The full three-platform onedir/onefile + fresh matrix is intentionally a
  # release gate.  It is too large to run on every documentation or small UI
  # change; use the ten-minute Fast Verify workflow for normal pushes/PRs.
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why the full release matrix is being run'
        required: false
        default: 'release evidence or cross-platform packaging change'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.7'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYFCSTM_EXPECTED_COMMIT: f142a656df43e0b80ed6b7ac63b0696345325646

jobs:
  # Stage 1 builds both distribution layouts on their native target OS and
  # exercises source plus frozen products before publication.
  build:
    name: Package (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-22.04, label: linux-x86_64, executable: fcstm-gui, cc: gcc, cxx: g++}
          - {os: windows-2022, label: windows-x86_64, executable: fcstm-gui.exe, cc: gcc, cxx: g++}
          - {os: macos-15-intel, label: macos-x86_64, executable: fcstm-gui, cc: clang, cxx: clang++}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Windows Cairo and compiler runtime
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-gcc

      - name: Expose Windows MinGW runtime
        if: runner.os == 'Windows'
        shell: bash
        run: echo "MINGW_BIN=$(cygpath -u '${{ steps.msys2.outputs.msys2-location }}\mingw64\bin')" >> "$GITHUB_ENV"

      - name: Set Windows native GUI resolution
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-DisplayResolution -Width 1920 -Height 1080 -Force
          $display = Get-CimInstance Win32_VideoController |
            Where-Object { $_.CurrentHorizontalResolution -and $_.CurrentVerticalResolution } |
            Select-Object -First 1
          $display | Select-Object CurrentHorizontalResolution, CurrentVerticalResolution
          if ($display.CurrentHorizontalResolution -lt 1920 -or
              $display.CurrentVerticalResolution -lt 1080) {
            throw "Windows display resolution is below 1920x1080"
          }

      - name: Install Linux build runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential xvfb \
            libxkbcommon-x11-0 libxkbcommon0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-sync1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxcb-cursor0 \
            libegl1 libgl1 libglx-mesa0 libopengl0 \
            libfontconfig1 libdbus-1-3 libnss3 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 x11-utils

      - name: Install dependencies and generate UI
        shell: bash
        run: |
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          python -m pip install -r requirements-build.txt -r requirements-test.txt -r requirements.txt
          make ui

      - name: Verify pinned pyfcstm source
        shell: bash
        env:
          PYFCSTM_TARGET_LABEL: ${{ matrix.label }}
        run: |
          python - <<'PY'
          import json
          import os
          import importlib_metadata

          expected = os.environ['PYFCSTM_EXPECTED_COMMIT']
          distribution = importlib_metadata.distribution('pyfcstm')
          direct_url = json.loads(distribution.read_text('direct_url.json') or '{}')
          vcs_info = direct_url.get('vcs_info') or {}
          installed = vcs_info.get('commit_id')
          summary = '\n'.join([
              '### pyfcstm dependency provenance ({})'.format(os.environ['PYFCSTM_TARGET_LABEL']),
              '',
              '- Status: **{}**'.format('PASS' if installed == expected else 'FAIL'),
              '- Expected commit: `{}`'.format(expected),
              '- Installed commit: `{}`'.format(installed or '<missing>'),
              '- Requested revision: `{}`'.format(vcs_info.get('requested_revision') or '<missing>'),
              '- Source URL: `{}`'.format(direct_url.get('url') or '<missing>'),
          ]) + '\n'
          print(summary)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as stream:
              stream.write(summary)
          if installed != expected:
              raise SystemExit('pyfcstm source mismatch')
          PY

      - name: Tests and source product checks
        shell: bash
        env:
          FCSTM_GUI_PRODUCT_LAYOUT: source
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          run_gui() {
            case "$RUNNER_OS" in
              Linux) xvfb-run -a env QT_QPA_PLATFORM=xcb "$@" ;;
              Windows) env QT_QPA_PLATFORM=windows "$@" ;;
              macOS) env QT_QPA_PLATFORM=cocoa "$@" ;;
              *) return 1 ;;
            esac
          }
          mkdir -p evidence/source
          # The full acceptance driver is run below in fresh processes for
          # every viewport/scale pair.  Do not nest that same 140-case driver
          # inside pytest: re-entering a live native Qt application can crash
          # XCB and can leak native file-dialog state on Windows.
          run_gui python -m pytest test -q --timeout=600 \
            --deselect=test/test_acceptance_check.py::test_full_gui_acceptance_writes_report \
            --junitxml=evidence/source/pytest.xml \
            2>&1 | tee evidence/source/pytest.log
          run_gui python main.py --self-check --json-report evidence/source/self-check.json 2>&1 | tee evidence/source/self-check.log
          for viewport in 1280x720 1920x1080; do
            for scale in 1 1.5 2; do
              key="${viewport}-scale-${scale}"
              mkdir -p "evidence/source/acceptance/${key}"
              QT_SCALE_FACTOR="$scale" run_gui python main.py --acceptance-check \
                --viewport "$viewport" \
                --json-report "evidence/source/acceptance/${key}/report.json" \
                --artifact-dir "evidence/source/acceptance/${key}/artifacts" \
              2>&1 | tee "evidence/source/acceptance/${key}/run.log"
            done
          done

      - name: M7 application service branch coverage gate
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          python -m coverage run --branch -m pytest \
            test/application/test_simulation.py \
            test/application/test_graph_render.py \
            test/application/test_export.py \
            -q --timeout=60
          python -m coverage report \
            --include='app/application/simulation.py,app/application/graph_render.py,app/application/export.py' \
            --fail-under=90 | tee evidence/source/application-branch-coverage.txt

      - name: Generate, compile, and execute all five templates
        shell: bash
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          python scripts/verify_generated_templates.py \
            --output-dir evidence/source/generated-templates \
            2>&1 | tee evidence/source/generated-templates.log

      - name: Build and verify onedir
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onedir
          FCSTM_GUI_PRODUCT_LAYOUT: onedir
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          run_gui() {
            case "$RUNNER_OS" in
              Linux) xvfb-run -a env QT_QPA_PLATFORM=xcb "$@" ;;
              Windows) env QT_QPA_PLATFORM=windows "$@" ;;
              macOS) env QT_QPA_PLATFORM=cocoa "$@" ;;
              *) return 1 ;;
            esac
          }
          pyinstaller --noconfirm main.spec 2>&1 | tee evidence/onedir-build.log
          mkdir -p evidence/onedir
          executable="./dist/fcstm-gui/${{ matrix.executable }}"
          run_gui "$executable" --self-check --json-report evidence/onedir/self-check.json 2>&1 | tee evidence/onedir/self-check.log
          for viewport in 1280x720 1920x1080; do
            for scale in 1 1.5 2; do
              key="${viewport}-scale-${scale}"
              mkdir -p "evidence/onedir/acceptance/${key}"
              QT_SCALE_FACTOR="$scale" run_gui "$executable" --acceptance-check \
                --viewport "$viewport" \
                --json-report "evidence/onedir/acceptance/${key}/report.json" \
                --artifact-dir "evidence/onedir/acceptance/${key}/artifacts" \
              2>&1 | tee "evidence/onedir/acceptance/${key}/run.log"
            done
          done

      - name: Archive onedir
        shell: bash
        run: python -c "import shutil; shutil.make_archive('fcstm-gui-${{ matrix.label }}', 'zip', 'dist', 'fcstm-gui')"

      - name: Upload onedir product
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}
          path: fcstm-gui-${{ matrix.label }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Build and verify onefile
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onefile
          FCSTM_GUI_PRODUCT_LAYOUT: onefile
        run: |
          set -o pipefail
          if [ -n "${MINGW_BIN:-}" ]; then export PATH="$PATH:$MINGW_BIN"; fi
          run_gui() {
            case "$RUNNER_OS" in
              Linux) xvfb-run -a env QT_QPA_PLATFORM=xcb "$@" ;;
              Windows) env QT_QPA_PLATFORM=windows "$@" ;;
              macOS) env QT_QPA_PLATFORM=cocoa "$@" ;;
              *) return 1 ;;
            esac
          }
          rm -rf build dist
          pyinstaller --noconfirm main.spec 2>&1 | tee evidence/onefile-build.log
          mkdir -p evidence/onefile
          executable="./dist/${{ matrix.executable }}"
          run_gui "$executable" --self-check --json-report evidence/onefile/self-check.json 2>&1 | tee evidence/onefile/self-check.log
          for viewport in 1280x720 1920x1080; do
            for scale in 1 1.5 2; do
              key="${viewport}-scale-${scale}"
              mkdir -p "evidence/onefile/acceptance/${key}"
              QT_SCALE_FACTOR="$scale" run_gui "$executable" --acceptance-check \
                --viewport "$viewport" \
                --json-report "evidence/onefile/acceptance/${key}/report.json" \
                --artifact-dir "evidence/onefile/acceptance/${key}/artifacts" \
              2>&1 | tee "evidence/onefile/acceptance/${key}/run.log"
            done
          done

      - name: Upload onefile product
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-onefile
          path: dist/${{ matrix.executable }}
          if-no-files-found: error
          retention-days: 14

      - name: Build machine-readable evidence manifest
        shell: bash
        run: |
          python - <<'PY'
          import shutil
          from pathlib import Path

          evidence = Path('evidence')
          inputs = evidence / 'manifest-input'
          reports = inputs / 'reports'
          screenshots = inputs / 'screenshots'
          tools = evidence / 'tools'
          reports.mkdir(parents=True, exist_ok=True)
          screenshots.mkdir(parents=True, exist_ok=True)
          tools.mkdir(parents=True, exist_ok=True)
          shutil.copyfile('scripts/build_acceptance_evidence.py', tools / 'build_acceptance_evidence.py')
          shutil.copyfile('scripts/verify_evidence_contract.py', tools / 'verify_evidence_contract.py')
          for path in tuple(evidence.rglob('*')):
              if not path.is_file() or inputs in path.parents:
                  continue
              relative = path.relative_to(evidence).as_posix().replace('/', '__')
              if path.name == 'self-check.json' or (
                  path.name == 'report.json' and 'acceptance' in path.parts
              ):
                  shutil.copyfile(str(path), str(reports / relative))
              if path.suffix.lower() == '.png':
                  shutil.copyfile(str(path), str(screenshots / relative))
          PY
          python scripts/build_acceptance_evidence.py \
            --reports evidence/manifest-input/reports \
            --artifacts evidence \
            --screenshots evidence/manifest-input/screenshots \
            --commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --product "fcstm-gui-${{ matrix.label }}.zip" \
            --product "dist/${{ matrix.executable }}" \
            --product-manifest evidence/product-manifest.json \
            --output evidence/acceptance-evidence.json
          python scripts/verify_evidence_contract.py \
            --evidence evidence/acceptance-evidence.json \
            --reports evidence/manifest-input/reports \
            --artifact-root evidence

      - name: Upload build verification evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-build-evidence
          path: evidence
          if-no-files-found: error
          retention-days: 14

  # Stage 2 deliberately has no checkout, setup-python, pip, or project
  # dependencies. It treats both downloaded products as black boxes.
  verify:
    name: Verify on fresh ${{ matrix.label }}
    needs: build
    if: ${{ always() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-22.04, label: linux-x86_64, executable: fcstm-gui}
          - {os: windows-2022, label: windows-x86_64, executable: fcstm-gui.exe}
          - {os: macos-15-intel, label: macos-x86_64, executable: fcstm-gui}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Show fresh runner inventory
        shell: bash
        run: |
          uname -a || true
          which python || true
          which python3 || true
          which cc || true
          which c++ || true
          which dot || true

      - name: Install Linux host runtime only
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb default-jre-headless

      - name: Set up Java 11 on Windows and macOS
        if: runner.os != 'Linux'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'

      - name: Set Windows native GUI resolution
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Set-DisplayResolution -Width 1920 -Height 1080 -Force
          $display = Get-CimInstance Win32_VideoController |
            Where-Object { $_.CurrentHorizontalResolution -and $_.CurrentVerticalResolution } |
            Select-Object -First 1
          $display | Select-Object CurrentHorizontalResolution, CurrentVerticalResolution
          if ($display.CurrentHorizontalResolution -lt 1920 -or
              $display.CurrentVerticalResolution -lt 1080) {
            throw "Windows display resolution is below 1920x1080"
          }

      - name: Confirm Java runtime
        shell: bash
        run: java -version

      - name: Download onedir product
        uses: actions/download-artifact@v8
        with:
          name: fcstm-gui-${{ matrix.label }}
          path: downloaded/onedir

      - name: Download onefile product
        uses: actions/download-artifact@v8
        with:
          name: fcstm-gui-${{ matrix.label }}-onefile
          path: downloaded/onefile

      - name: Download build evidence tools and product manifest
        uses: actions/download-artifact@v8
        with:
          name: fcstm-gui-${{ matrix.label }}-build-evidence
          path: build-evidence

      - name: Unpack onedir
        shell: bash
        run: |
          mkdir -p extracted
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Expand-Archive -Path 'downloaded/onedir/fcstm-gui-${{ matrix.label }}.zip' -DestinationPath 'extracted'"
          else
            unzip -q "downloaded/onedir/fcstm-gui-${{ matrix.label }}.zip" -d extracted
          fi

      - name: Mark POSIX binaries executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x "extracted/fcstm-gui/${{ matrix.executable }}" "downloaded/onefile/${{ matrix.executable }}"

      - name: Verify executable format and x86_64 architecture
        shell: bash
        run: |
          set -o pipefail
          onedir="extracted/fcstm-gui/${{ matrix.executable }}"
          onefile="downloaded/onefile/${{ matrix.executable }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cat > verify-pe-x64.ps1 <<'PS'
          param([string]$Path)
          $bytes = [System.IO.File]::ReadAllBytes($Path)
          if ($bytes.Length -lt 0x40 -or $bytes[0] -ne 0x4d -or $bytes[1] -ne 0x5a) { throw "missing MZ header: $Path" }
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          if ($bytes.Length -lt ($pe + 6) -or $bytes[$pe] -ne 0x50 -or $bytes[$pe + 1] -ne 0x45) { throw "missing PE signature: $Path" }
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x8664) { throw "not PE x86_64: $Path machine=$machine" }
          Write-Output "$Path PE x86_64"
          PS
            powershell -NoProfile -ExecutionPolicy Bypass -File verify-pe-x64.ps1 "$onedir" | tee onedir-file.txt
            powershell -NoProfile -ExecutionPolicy Bypass -File verify-pe-x64.ps1 "$onefile" | tee onefile-file.txt
          else
            file "$onedir" | tee onedir-file.txt
            file "$onefile" | tee onefile-file.txt
            case "$RUNNER_OS" in
              Linux) pattern='ELF 64-bit.*x86-64' ;;
              macOS) pattern='Mach-O 64-bit.*x86_64' ;;
              *) exit 1 ;;
            esac
            grep -E "$pattern" onedir-file.txt
            grep -E "$pattern" onefile-file.txt
          fi

      - name: Black-box verify onedir
        shell: bash
        env:
          FCSTM_GUI_PRODUCT_LAYOUT: onedir
        run: |
          set -o pipefail
          mkdir -p evidence/onedir
          if [ "$RUNNER_OS" = "Windows" ]; then
            tool_dir="$(cygpath -u "$RUNNER_TEMP")/fcstm-gui-no-tools"
          else
            tool_dir="$RUNNER_TEMP/fcstm-gui-no-tools"
          fi
          mkdir -p "$tool_dir"
          : > evidence/onedir/fresh-tool-preflight.log
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            {
              echo '#!/usr/bin/env sh'
              echo "echo fresh runner forbids $tool >&2"
              echo 'exit 127'
            } > "$tool_dir/$tool"
            {
              echo '@echo off'
              echo "echo fresh runner forbids $tool 1>&2"
              echo 'exit /b 127'
            } > "$tool_dir/$tool.cmd"
            chmod +x "$tool_dir/$tool" "$tool_dir/$tool.cmd"
          done
          export PATH="$tool_dir:$PATH"
          export GRAPHVIZ_DOT="$tool_dir/dot"
          export CC="$tool_dir/cc"
          export CXX="$tool_dir/c++"
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            resolved="$(command -v "$tool")"
            printf '%s -> %s\n' "$tool" "$resolved" | tee -a evidence/onedir/fresh-tool-preflight.log
            case "$resolved" in
              "$tool_dir"/*) ;;
              *) echo "$tool escaped fresh shadow: $resolved" >&2; exit 1 ;;
            esac
            set +e
            "$tool" --version >> evidence/onedir/fresh-tool-preflight.log 2>&1
            status=$?
            set -e
            printf '%s exit=%s\n' "$tool" "$status" | tee -a evidence/onedir/fresh-tool-preflight.log
            test "$status" -eq 127
          done
          executable="./extracted/fcstm-gui/${{ matrix.executable }}"
          run_gui() {
            case "$RUNNER_OS" in
              Linux) xvfb-run -a env QT_QPA_PLATFORM=xcb "$@" ;;
              Windows) env QT_QPA_PLATFORM=windows "$@" ;;
              macOS) env QT_QPA_PLATFORM=cocoa "$@" ;;
              *) return 1 ;;
            esac
          }
          run_gui "$executable" --self-check --json-report evidence/onedir/self-check.json 2>&1 | tee evidence/onedir/self-check.log
          for viewport in 1280x720 1920x1080; do
            for scale in 1 1.5 2; do
              key="${viewport}-scale-${scale}"
              mkdir -p "evidence/onedir/acceptance/${key}"
              QT_SCALE_FACTOR="$scale" run_gui "$executable" --acceptance-check \
                --viewport "$viewport" \
                --json-report "evidence/onedir/acceptance/${key}/report.json" \
                --artifact-dir "evidence/onedir/acceptance/${key}/artifacts" \
              2>&1 | tee "evidence/onedir/acceptance/${key}/run.log"
            done
          done
          case "$RUNNER_OS" in
            Linux) expected_qt=xcb ;;
            Windows) expected_qt=windows ;;
            macOS) expected_qt=cocoa ;;
          esac
          grep -F "\"qt_platform\": \"$expected_qt\"" evidence/onedir/self-check.json
          find evidence/onedir/acceptance -name report.json -exec \
            grep -F "\"qt_platform\": \"$expected_qt\"" {} \;

      - name: Black-box verify onefile
        shell: bash
        env:
          FCSTM_GUI_PRODUCT_LAYOUT: onefile
        run: |
          set -o pipefail
          mkdir -p evidence/onefile
          if [ "$RUNNER_OS" = "Windows" ]; then
            tool_dir="$(cygpath -u "$RUNNER_TEMP")/fcstm-gui-no-tools"
          else
            tool_dir="$RUNNER_TEMP/fcstm-gui-no-tools"
          fi
          mkdir -p "$tool_dir"
          : > evidence/onefile/fresh-tool-preflight.log
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            {
              echo '#!/usr/bin/env sh'
              echo "echo fresh runner forbids $tool >&2"
              echo 'exit 127'
            } > "$tool_dir/$tool"
            {
              echo '@echo off'
              echo "echo fresh runner forbids $tool 1>&2"
              echo 'exit /b 127'
            } > "$tool_dir/$tool.cmd"
            chmod +x "$tool_dir/$tool" "$tool_dir/$tool.cmd"
          done
          export PATH="$tool_dir:$PATH"
          export GRAPHVIZ_DOT="$tool_dir/dot"
          export CC="$tool_dir/cc"
          export CXX="$tool_dir/c++"
          for tool in python python3 cc c++ gcc g++ clang clang++ dot; do
            resolved="$(command -v "$tool")"
            printf '%s -> %s\n' "$tool" "$resolved" | tee -a evidence/onefile/fresh-tool-preflight.log
            case "$resolved" in
              "$tool_dir"/*) ;;
              *) echo "$tool escaped fresh shadow: $resolved" >&2; exit 1 ;;
            esac
            set +e
            "$tool" --version >> evidence/onefile/fresh-tool-preflight.log 2>&1
            status=$?
            set -e
            printf '%s exit=%s\n' "$tool" "$status" | tee -a evidence/onefile/fresh-tool-preflight.log
            test "$status" -eq 127
          done
          executable="./downloaded/onefile/${{ matrix.executable }}"
          run_gui() {
            case "$RUNNER_OS" in
              Linux) xvfb-run -a env QT_QPA_PLATFORM=xcb "$@" ;;
              Windows) env QT_QPA_PLATFORM=windows "$@" ;;
              macOS) env QT_QPA_PLATFORM=cocoa "$@" ;;
              *) return 1 ;;
            esac
          }
          run_gui "$executable" --self-check --json-report evidence/onefile/self-check.json 2>&1 | tee evidence/onefile/self-check.log
          for viewport in 1280x720 1920x1080; do
            for scale in 1 1.5 2; do
              key="${viewport}-scale-${scale}"
              mkdir -p "evidence/onefile/acceptance/${key}"
              QT_SCALE_FACTOR="$scale" run_gui "$executable" --acceptance-check \
                --viewport "$viewport" \
                --json-report "evidence/onefile/acceptance/${key}/report.json" \
                --artifact-dir "evidence/onefile/acceptance/${key}/artifacts" \
              2>&1 | tee "evidence/onefile/acceptance/${key}/run.log"
            done
          done
          case "$RUNNER_OS" in
            Linux) expected_qt=xcb ;;
            Windows) expected_qt=windows ;;
            macOS) expected_qt=cocoa ;;
          esac
          grep -F "\"qt_platform\": \"$expected_qt\"" evidence/onefile/self-check.json
          find evidence/onefile/acceptance -name report.json -exec \
            grep -F "\"qt_platform\": \"$expected_qt\"" {} \;

      - name: Build fresh-runner evidence manifest
        shell: bash
        run: |
          control_python="$(command -v python || command -v python3)"
          mkdir -p evidence/control-plane
          {
            echo "purpose=evidence-control-plane-only"
            echo "project_imports=forbidden"
            echo "product_execution=forbidden"
            echo "executable=$control_python"
            "$control_python" --version
          } 2>&1 | tee evidence/control-plane/python.txt
          "$control_python" - <<'PY'
          import shutil
          from pathlib import Path

          evidence = Path('evidence')
          inputs = evidence / 'manifest-input'
          reports = inputs / 'reports'
          screenshots = inputs / 'screenshots'
          reports.mkdir(parents=True, exist_ok=True)
          screenshots.mkdir(parents=True, exist_ok=True)
          for path in tuple(evidence.rglob('*')):
              if not path.is_file() or inputs in path.parents:
                  continue
              relative = path.relative_to(evidence).as_posix().replace('/', '__')
              if path.name == 'self-check.json' or (
                  path.name == 'report.json' and 'acceptance' in path.parts
              ):
                  shutil.copyfile(str(path), str(reports / relative))
              if path.suffix.lower() == '.png':
                  shutil.copyfile(str(path), str(screenshots / relative))
          PY
          "$control_python" build-evidence/tools/build_acceptance_evidence.py \
            --reports evidence/manifest-input/reports \
            --artifacts evidence \
            --screenshots evidence/manifest-input/screenshots \
            --commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --product "downloaded/onedir/fcstm-gui-${{ matrix.label }}.zip" \
            --product "downloaded/onefile/${{ matrix.executable }}" \
            --product-manifest evidence/product-manifest.json \
            --expected-product-manifest build-evidence/product-manifest.json \
            --output evidence/acceptance-evidence.json
          "$control_python" build-evidence/tools/verify_evidence_contract.py \
            --evidence evidence/acceptance-evidence.json \
            --reports evidence/manifest-input/reports \
            --artifact-root evidence

      - name: Upload fresh-runner verification evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fcstm-gui-${{ matrix.label }}-fresh-evidence
          path: evidence
          if-no-files-found: error
          retention-days: 14
