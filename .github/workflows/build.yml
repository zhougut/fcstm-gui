name: Build, Test & Verify
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
env:
  PYTHON_VERSION: '3.7'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  build:
    name: Package (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-22.04, label: linux-x86_64, executable: fcstm-gui}
          - {os: windows-2022, label: windows-x86_64, executable: fcstm-gui.exe}
          - {os: macos-15-intel, label: macos-x86_64, executable: fcstm-gui}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
      - name: Install Windows Cairo build runtime
        if: runner.os == 'Windows'
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-cairo
      - name: Expose Windows Cairo build runtime
        if: runner.os == 'Windows'
        shell: bash
        run: echo "CAIRO_BIN=$(cygpath -u '${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin')" >> "$GITHUB_ENV"
      - name: Install Linux build runtime
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0 libegl1 libgl1
      - name: Install and generate UI
        shell: bash
        run: |
          if [ -n "${CAIRO_BIN:-}" ]; then export PATH="$PATH:$CAIRO_BIN"; fi
          python -m pip install -r requirements-build.txt -r requirements-test.txt -r requirements.txt
          make ui
      - name: Verify pinned pyfcstm source
        shell: bash
        env:
          PYFCSTM_EXPECTED_COMMIT: f142a656df43e0b80ed6b7ac63b0696345325646
          PYFCSTM_TARGET_LABEL: ${{ matrix.label }}
        run: |
          python - <<'PY'
          import json
          import os

          import importlib_metadata

          expected = os.environ['PYFCSTM_EXPECTED_COMMIT']
          label = os.environ['PYFCSTM_TARGET_LABEL']
          distribution = importlib_metadata.distribution('pyfcstm')
          raw_direct_url = distribution.read_text('direct_url.json')

          direct_url = {}
          parse_error = None
          if raw_direct_url:
              try:
                  direct_url = json.loads(raw_direct_url)
              except (TypeError, ValueError) as exc:
                  parse_error = str(exc)

          vcs_info = direct_url.get('vcs_info') or {}
          installed = vcs_info.get('commit_id')
          requested = vcs_info.get('requested_revision')
          source_url = direct_url.get('url')
          passed = installed == expected and parse_error is None

          def shown(value):
              return value if value is not None else '<missing>'

          summary_lines = [
              '### pyfcstm dependency provenance ({})'.format(label),
              '',
              '- Status: **{}**'.format('PASS' if passed else 'FAIL'),
              '- Expected commit: `{}`'.format(expected),
              '- Installed commit: `{}`'.format(shown(installed)),
              '- Requested revision: `{}`'.format(shown(requested)),
              '- Source URL: `{}`'.format(shown(source_url)),
              '- Evidence: `direct_url.json`',
          ]
          if parse_error is not None:
              summary_lines.append('- Parse error: `{}`'.format(parse_error))
          summary = '\n'.join(summary_lines) + '\n'
          print(summary)

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_path:
              with open(summary_path, 'a', encoding='utf-8') as summary_file:
                  summary_file.write(summary)

          if not passed:
              raise SystemExit(
                  'pyfcstm source mismatch: expected {}, installed {}'.format(
                      expected, shown(installed)
                  )
              )
          PY
      - name: Tests and source self-check
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ -n "${CAIRO_BIN:-}" ]; then export PATH="$PATH:$CAIRO_BIN"; fi
          python -m pytest test -q
          python main.py --self-check
      - name: Build and smoke-test onedir
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onedir
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ -n "${CAIRO_BIN:-}" ]; then export PATH="$PATH:$CAIRO_BIN"; fi
          pyinstaller --noconfirm main.spec
          ./dist/fcstm-gui/${{ matrix.executable }} --self-check
      - name: Archive onedir
        shell: bash
        run: python -c "import shutil; shutil.make_archive('fcstm-gui-${{ matrix.label }}', 'zip', 'dist', 'fcstm-gui')"
      - uses: actions/upload-artifact@v5
        with:
          name: fcstm-gui-${{ matrix.label }}
          path: fcstm-gui-${{ matrix.label }}.zip
          if-no-files-found: error
      - name: Build and smoke-test onefile
        shell: bash
        env:
          FCSTM_GUI_BUILD_MODE: onefile
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ -n "${CAIRO_BIN:-}" ]; then export PATH="$PATH:$CAIRO_BIN"; fi
          rm -rf build dist
          pyinstaller --noconfirm main.spec
          ./dist/${{ matrix.executable }} --self-check
      - uses: actions/upload-artifact@v5
        with:
          name: fcstm-gui-${{ matrix.label }}-onefile
          path: dist/${{ matrix.executable }}
          if-no-files-found: error

  verify:
    name: Verify on fresh ${{ matrix.label }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-22.04, label: linux-x86_64, executable: fcstm-gui}
          - {os: windows-2022, label: windows-x86_64, executable: fcstm-gui.exe}
          - {os: macos-15-intel, label: macos-x86_64, executable: fcstm-gui}
    runs-on: ${{ matrix.os }}
    steps:
      # Deliberately no checkout, setup-python, or pip install in this job.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
      - name: Install Linux host runtime only (no Python dependencies)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb default-jre-headless
      - uses: actions/download-artifact@v5
        with:
          name: fcstm-gui-${{ matrix.label }}
          path: downloaded/onedir
      - uses: actions/download-artifact@v5
        with:
          name: fcstm-gui-${{ matrix.label }}-onefile
          path: downloaded/onefile
      - name: Unpack onedir
        shell: bash
        run: |
          mkdir -p extracted
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -Command "Expand-Archive -Path 'downloaded/onedir/fcstm-gui-${{ matrix.label }}.zip' -DestinationPath 'extracted'"
          else
            unzip -q "downloaded/onedir/fcstm-gui-${{ matrix.label }}.zip" -d extracted
          fi
      - name: Mark POSIX binaries executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x extracted/fcstm-gui/${{ matrix.executable }} downloaded/onefile/${{ matrix.executable }}
      - name: Black-box self-check onedir
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./extracted/fcstm-gui/${{ matrix.executable }} --self-check
      - name: Black-box self-check onefile
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./downloaded/onefile/${{ matrix.executable }} --self-check
